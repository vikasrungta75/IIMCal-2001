<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600">
  <defs>
    <linearGradient id="street" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#87CEEB"/>
      <stop offset="70%" style="stop-color:#E8D5A3" stop-opacity="0.3"/>
      <stop offset="100%" style="stop-color:#c8a96a"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="600" fill="#87CEEB"/>
  <!-- Buildings background -->
  <rect x="0" y="150" width="200" height="300" fill="#d4c4a0"/>
  <rect x="180" y="200" width="150" height="250" fill="#c8b890"/>
  <rect x="900" y="170" width="180" height="280" fill="#d4c4a0"/>
  <rect x="1050" y="210" width="150" height="240" fill="#c0aa80"/>
  <!-- Building windows -->
  <rect x="30" y="180" width="20" height="25" fill="#4a7abf" opacity="0.7"/>
  <rect x="70" y="180" width="20" height="25" fill="#4a7abf" opacity="0.7"/>
  <rect x="110" y="180" width="20" height="25" fill="#4a7abf" opacity="0.7"/>
  <rect x="930" y="200" width="20" height="25" fill="#4a7abf" opacity="0.7"/>
  <rect x="970" y="200" width="20" height="25" fill="#4a7abf" opacity="0.7"/>
  <!-- Road -->
  <rect x="0" y="420" width="1200" height="180" fill="#555"/>
  <rect x="0" y="415" width="1200" height="10" fill="#888"/>
  <!-- Road markings -->
  <rect x="100" y="490" width="80" height="8" fill="#FFD700" opacity="0.8"/>
  <rect x="300" y="490" width="80" height="8" fill="#FFD700" opacity="0.8"/>
  <rect x="500" y="490" width="80" height="8" fill="#FFD700" opacity="0.8"/>
  <rect x="700" y="490" width="80" height="8" fill="#FFD700" opacity="0.8"/>
  <rect x="900" y="490" width="80" height="8" fill="#FFD700" opacity="0.8"/>
  <rect x="1100" y="490" width="80" height="8" fill="#FFD700" opacity="0.8"/>
  <!-- Yellow Taxi body -->
  <rect x="380" y="330" width="400" height="110" fill="#FFD700" rx="10"/>
  <!-- Taxi roof -->
  <rect x="440" y="285" width="280" height="55" fill="#FFD700" rx="8"/>
  <!-- Taxi sign on roof -->
  <rect x="540" y="268" width="100" height="22" fill="white" rx="4"/>
  <text x="590" y="284" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#003366" font-weight="bold">TAXI</text>
  <!-- Windows -->
  <rect x="455" y="295" width="100" height="40" fill="#87CEEB" rx="4" opacity="0.8"/>
  <rect x="570" y="295" width="100" height="40" fill="#87CEEB" rx="4" opacity="0.8"/>
  <rect x="685" y="295" width="80" height="40" fill="#87CEEB" rx="4" opacity="0.8"/>
  <!-- Door lines -->
  <line x1="570" y1="330" x2="570" y2="440" stroke="#e6b800" stroke-width="2"/>
  <line x1="685" y1="330" x2="685" y2="440" stroke="#e6b800" stroke-width="2"/>
  <!-- Door handle -->
  <rect x="695" y="380" width="20" height="6" fill="#888" rx="3"/>
  <!-- Front grill -->
  <rect x="380" y="370" width="30" height="50" fill="#888" rx="3"/>
  <rect x="385" y="375" width="20" height="6" fill="#555" rx="1"/>
  <rect x="385" y="390" width="20" height="6" fill="#555" rx="1"/>
  <rect x="385" y="405" width="20" height="6" fill="#555" rx="1"/>
  <!-- Headlights -->
  <ellipse cx="395" cy="365" rx="15" ry="10" fill="#fffbe6"/>
  <!-- Wheels -->
  <circle cx="460" cy="440" r="40" fill="#333"/>
  <circle cx="460" cy="440" r="28" fill="#888"/>
  <circle cx="460" cy="440" r="12" fill="#555"/>
  <circle cx="700" cy="440" r="40" fill="#333"/>
  <circle cx="700" cy="440" r="28" fill="#888"/>
  <circle cx="700" cy="440" r="12" fill="#555"/>
  <!-- Bumper -->
  <rect x="375" y="430" width="30" height="10" fill="#888" rx="2"/>
  <rect x="755" y="430" width="30" height="10" fill="#888" rx="2"/>
  <text x="600" y="580" text-anchor="middle" font-family="Georgia, serif" font-size="26" fill="#003366" font-weight="bold">The Iconic Yellow Taxi — Kolkata</text>
</svg>
